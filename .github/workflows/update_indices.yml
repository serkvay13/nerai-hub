name: Update GDELT Indices & Forecasts

on:
  schedule:
    - cron: '0 5 * * *'   # Every day at 05:00 UTC (08:00 Turkey)
  workflow_dispatch:

jobs:
  update-indices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install data dependencies
        run: pip install pandas feedparser yfinance scipy

      - name: Run GDELT indices script
        run: python gdelt_indices.py

      - name: Run RSS enrichment script
        run: python rss_enrichment.py
        continue-on-error: true

      - name: Run commodity data script
        run: python commodity_data.py
        continue-on-error: true

      - name: Commit updated data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add indices.csv
          git add -f enriched_articles.csv || true
          git add -f commodities.csv || true
          git diff --staged --quiet || git commit -m "chore: auto-update GDELT indices + RSS/commodity data [$(date +%Y-%m-%d)]"
          git push

  update-forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    needs: update-indices

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install forecast dependencies
        run: |
          pip install pandas numpy statsforecast
          pip install neuralforecast || echo "neuralforecast unavailable, using statsforecast only"

      - name: Pull latest indices.csv
        run: git pull

      - name: Run forecast engine
        run: python gdelt_forecast.py

      - name: Commit predictions
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add predictions.csv forecast_trends.csv
          git diff --staged --quiet || git commit -m "chore: auto-update N-HiTS predictions [$(date +%Y-%m-%d)]"
          git push
